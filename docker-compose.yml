services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ruby_pos}
      POSTGRES_USER: ${DB_USER:-ruby_pos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ruby_pos}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
